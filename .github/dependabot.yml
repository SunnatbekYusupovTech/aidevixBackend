version: 2
updates:
  # Backend (Express/Mongoose) deps
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types: [minor, patch]

  # Frontend (Next.js) deps
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types: [minor, patch]

  # GitHub Actions workflow versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
